#this is workflow name
name: Hello workflow

#run on trigger
on:
  push:
    branches: [main]

#these are jobs inside the workflow
jobs: 

#thisis the name of the job
  greet:
  
  # this is github runner
    runs-on: ubuntu-latest
    
    steps:
      - name: say hello to users
        run: echo "Hello users"

      - name: say hello to username
        run: echo "Hello $USER"
