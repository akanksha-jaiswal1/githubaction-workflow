#API KEYS, SENSITIVE DATA

name: Secrets Scan

on:
    workflow_call:

jobs:
    secrets-scan:
        runs-on: ubuntu_latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Run Gitleaks Scanner
              uses: gitleaks/gitleaks-action@v2
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}