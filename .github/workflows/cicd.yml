name: CICD

on:
  workflow_dispatch:

    inputs:
      environment:
        description: This is env where workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Codeclone from Github"
      
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Docker container build"
      
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
      
  deploy:
    if: inputs.environment == 'dev'
    needs: [build, test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Check code deploy"






      
